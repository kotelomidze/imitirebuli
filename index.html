        const POEM_TEXT = `ამ ამბის თქმა გარჩევითა გულმან ამად არ მინება,
ბევრი ავი გამოჩნდების ჩვენი, მაზე მერცხვინება,
მტერს შაესმის, იამების, მოყვარეს კი ეწყინება.
რასაც ახლა ვამბობ, ვგონებ, ამაზედაც მხვდეს გინება.

ტყუილი ვთქვა, ჩემი თქმული შეიქნების რა სავარგი?
მართალი ვთქვა, მეშინიან, ვა, თუ გავხდე დასაკარგი!
კაცს მის მეტი არა აქვს რა სიკვდილს უკან თან საბარგი,
სულს მიუძღვის ხორცთ ნაქნარი: ავსა – ავი, კარგსა – კარგი.

აწ რომ ავი არ ვაძაგო, კარგი როგორ უნდა ვაქო,
ავს თუ ავი არ უწოდო, კარგს სახელად რა დავარქო,
კარგს კაცს ვითარ დაუკარგო, რაც რამ სიკარკაცე აქო,
ავს კაცს კარგი ვით უძებნო, ორმოს ჩამსვა, თავს დამარქო?!

პირსფერობა, უკან ძრახვა არა თქმულა საფარსაგო.
სჯობს ტყუილით ქვე ყოფნასა ზე სიმართლით ავიბარგო,
ვაზის მრგველთან ის არ ვაქო, ვინც მის ნაცვლად ძეძვი დარგო,
მაზე სული არ წარვსწყმინდო, რა გინდ ხორცით დავიკარგო.

მართალს ვიტყვი, შევიქნები ტყუილისა მოამბე რად?
ვერას უქებ საძაგელთა, უფერულთა პირსაფერად.
მე, თუ გინდა, თავი მომჭრან, ტანი გახდეს გასაბერად,
ვინც არა ჰგავს კახაბერსა, მე ვერ ვიტყვი კახაბერად.

მართალია, მძრახველს ძრახვა თვით კი ავად მოუხდების,
მაგრამ ფარვა სიავისა ქვეყანას არ მოუხდების!
წამხდენელთა და მბაძველთა კიდევ სხვაც რამ წაუხდების,
ძრახვავე სჯობს საძრახავთა, ძრახვას კაცი მოუფთხვების...

რა გინდ რომე კაცმან მალოს, ჭირი თავსა არ დამალავს,
ვერ გაუძლებს, რაც კაცს სენი გულსა უკოდს, სჩხვლეტს და მსჭვალავს.

თვით ვერ ხედავს, სხვის საჭვრეტლად, თუ არ უნდა, პირს რად ჰკალავს?

მე კი ვჰფარავ, მაგრამ ჩემი სატკივარი არა ჰფარავს,
მეტად მწარედ გული მტკივა, მაჟრჟოლებს და ტანში მზარავს!
ვერ მოვითმენ, რომ არ დავგმო აღმა მხვნელსა, დაღმა მბარავს,
ჩემი ცოდვამც მისცემია ჩემს ამამთხრელს, ამამბზარავს!`;

        function App() {
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [isFinished, setIsFinished] = useState(false);
            const [showFeedback, setShowFeedback] = useState(false);

            const currentQuestion = QUESTIONS[currentQuestionIndex];
            const progress = ((currentQuestionIndex + 1) / QUESTIONS.length) * 100;

            const handleAnswer = (optionIndex) => {
                if (showFeedback) return;
                setUserAnswers(prev => ({ ...prev, [currentQuestion.id]: optionIndex }));
                setShowFeedback(true);
            };

            const handleNext = () => {
                if (currentQuestionIndex < QUESTIONS.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setShowFeedback(false);
                } else {
                    setIsFinished(true);
                }
            };

            const handlePrevious = () => {
                if (currentQuestionIndex > 0) {
                    setCurrentQuestionIndex(prev => prev - 1);
                    setShowFeedback(false);
                }
            };

            const resetQuiz = () => {
                setCurrentQuestionIndex(0);
                setUserAnswers({});
                setIsFinished(false);
                setShowFeedback(false);
            };

            const score = useMemo(() => {
                return QUESTIONS.reduce((acc, q) => {
                    return userAnswers[q.id] === q.correctAnswer ? acc + 1 : acc;
                }, 0);
            }, [userAnswers]);

            if (isFinished) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-white p-8 rounded-[32px] shadow-xl max-w-md w-full text-center border border-[#5A5A40]/10">

                                    <IconAward />
                                </div>
                            </div>
                            <h2 className="text-3xl font-bold text-[#1a1a1a] mb-2">ტესტი დასრულდა!</h2>
                            <p className="text-[#5A5A40] mb-6">თქვენი შედეგი</p>
                            <div className="text-6xl font-black text-[#5A5A40] mb-8">
                                {score} / {QUESTIONS.length}
                            </div>
                            <button
                                onClick={resetQuiz}
                                className="w-full bg-[#5A5A40] text-white py-4 rounded-full font-medium hover:bg-[#4A4A30] transition-colors flex items-center justify-center gap-2"
                            >
                                <IconRotateCcw />
                                თავიდან დაწყება
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen animate-fade-in">
                    <header className="bg-white border-b border-[#5A5A40]/10 sticky top-0 z-10 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-[#5A5A40] text-white rounded-xl">
                                    <IconBookOpen />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold leading-tight">ტექსტის გააზრება</h1>
                                    <p className="text-xs text-[#5A5A40] uppercase tracking-wider font-sans">დავით გურამიშვილი - „დავითიანი“</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:block w-48 h-2 bg-[#5A5A40]/10 rounded-full overflow-hidden">
                                    <div className="h-full bg-[#5A5A40] transition-all duration-500" style={{ width: `${progress}%` }}></div>
                                </div>
                                <span className="text-sm font-medium font-sans text-[#5A5A40]">
                                    {currentQuestionIndex + 1} / {QUESTIONS.length}
                                </span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 p-6 lg:p-10">
                        <section className="bg-white rounded-[32px] p-8 lg:p-12 shadow-sm border border-[#5A5A40]/5 h-fit lg:sticky lg:top-28">
                            <h2 className="text-2xl font-bold mb-8 text-[#5A5A40] border-b border-[#5A5A40]/10 pb-4 italic">ტექსტი I</h2>
                            <div className="space-y-6">
                                {POEM_TEXT.split('\n\n').map((paragraph, i) => (
                                    <p key={i} className="mb-6 leading-relaxed whitespace-pre-line text-lg text-[#333]">
                                        {paragraph}
                                    </p>
                                ))}
                            </div>
                        </section>

                        <section className="flex flex-col gap-6">
                            <div className="bg-white rounded-[32px] p-8 lg:p-10 shadow-sm border border-[#5A5A40]/5">
                                <h3 className="text-2xl font-bold mb-8 leading-snug">{currentQuestion.text}</h3>
                                <div className="space-y-4">
                                    {currentQuestion.options.map((option, index) => {
                                        const isSelected = userAnswers[currentQuestion.id] === index;
                                        const isCorrect = index === currentQuestion.correctAnswer;
                                        const showCorrect = showFeedback && isCorrect;
                                        const showWrong = showFeedback && isSelected && !isCorrect;

                                        let bgColor = "bg-[#f5f5f0] hover:bg-[#ebebe5]";
                                        let borderColor = "border-transparent";
                                        let textColor = "text-[#1a1a1a]";

                                        if (showCorrect) {
                                            bgColor = "bg-emerald-50";
                                            borderColor = "border-emerald-500";
                                            textColor = "text-emerald-700";
                                        } else if (showWrong) {
                                            bgColor = "bg-rose-50";
                                            borderColor = "border-rose-500";
                                            textColor = "text-rose-700";
                                        } else if (isSelected && !showFeedback) {
                                            bgColor = "bg-[#5A5A40]/10";
                                            borderColor = "border-[#5A5A40]";
                                        }

                                        return (
                                            <button
                                                key={index}
                                                onClick={() => handleAnswer(index)}
                                                disabled={showFeedback}
                                                className={`w-full text-left p-6 rounded-2xl border-2 transition-all duration-200 flex items-start gap-4 ${bgColor} ${borderColor} ${textColor} group`}
                                            >
                                                <span className="font-sans font-bold text-sm mt-1 opacity-40 group-hover:opacity-100">
                                                    {String.fromCharCode(4304 + index)})
                                                </span>
                                                <span className="flex-1 text-lg leading-relaxed">{option}</span>
                                                {showCorrect && <div className="text-emerald-500 shrink-0 mt-1"><IconCheckCircle /></div>}
                                                {showWrong && <div className="text-rose-500 shrink-0 mt-1"><IconXCircle /></div>}
                                            </button>
                                        );
                                    })}
                                </div>

                                <div className="mt-10 flex items-center justify-between">
                                    <button
                                        onClick={handlePrevious}
                                        disabled={currentQuestionIndex === 0}
                                        className="flex items-center gap-2 text-[#5A5A40] font-medium disabled:opacity-30 hover:translate-x-[-4px] transition-transform"
                                    >
                                        <IconChevronLeft /> 
                                    </button>
                                    {showFeedback && (
                                        <button
                                            onClick={handleNext}
                                            className="bg-[#5A5A40] text-white px-8 py-3 rounded-full font-medium flex items-center gap-2 hover:bg-[#4A4A30] transition-colors shadow-lg shadow-[#5A5A40]/20"
                                        >
                                            {currentQuestionIndex === QUESTIONS.length - 1 ? "შედეგები" : "შემდეგი"}
                                            <IconChevronRight />
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="bg-[#5A5A40] text-white p-6 rounded-[32px] flex items-start gap-4">
                                <div className="bg-white/20 p-2 rounded-lg"><IconBookOpen /></div>
                                <div>
                                    <h4 className="font-bold mb-1">რჩევა</h4>
                                    <p className="text-sm opacity-90 leading-relaxed">ყურადღებით წაიკითხეთ ტექსტი. პასუხის გაცემამდე დარწმუნდით, რომ სწორად გაიგეთ ავტორის სათქმელი.</p>
                                </div>
                            </div>
                        </section>
                    </main>

                    <footer className="max-w-7xl mx-auto p-10 text-center text-[#5A5A40]/60 text-sm font-sans">
                        &copy; 2024 საგანმანათლებლო პლატფორმა მოსწავლეებისთვის
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
